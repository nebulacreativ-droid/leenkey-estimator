  <body>
    <style>
      /* Loader pré-React — masqué dès que React monte */
      #lk-boot-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
        z-index: 9999;
        transition: opacity .3s ease;
      }
      #lk-boot-loader.fade { opacity: 0; pointer-events: none; }
      #lk-boot-loader .ring {
        width: 44px; height: 44px;
        border: 3px solid #e2e8f0;
        border-top-color: #3B82F6;
        border-radius: 50%;
        animation: lk-spin .8s linear infinite;
      }
      @keyframes lk-spin { to { transform: rotate(360deg); } }
    </style>
    <div id="lk-boot-loader"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Cache le boot-loader dès que React a inséré du contenu dans #root
      (function() {
        var loader = document.getElementById('lk-boot-loader');
        var root = document.getElementById('root');
        if (!loader || !root) return;
        var observer = new MutationObserver(function() {
          if (root.childElementCount > 0) {
            // Attendre 200ms supplémentaires pour laisser le CSS premier rendu se faire
            setTimeout(function() {
              loader.classList.add('fade');
              setTimeout(function() { loader.remove(); }, 300);
            }, 200);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true });
        // Failsafe : disparaît après 5s max
        setTimeout(function() {
          if (loader.parentNode) {
            loader.classList.add('fade');
            setTimeout(function() { loader.remove(); }, 300);
          }
        }, 5000);
      })();
    </script>
  </body>
