document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

op 620ms var(--ease-out) 820ms both, lkFloat 6.5s var(--ease-in-out) 1700ms infinite; }\n  .estimate-card { animation:lkFloat 8s var(--ease-in-out) 1900ms infinite; }\n  .hero::before { animation:lkGlow 9s var(--ease-in-out) infinite; }\n  /* icon pop as cards reveal in */\n  .reveal.in .feat-icon, .reveal.in .step-n, .reveal.in .step-ic { animation:lkPop 520ms var(--ease-out) 140ms both; }\n}\n@keyframes lkRise { from { opacity:0; transform:translateY(26px); } to { opacity:1; transform:none; } }\n@keyframes lkFade { from { opacity:0; } to { opacity:1; } }\n@keyframes lkRiseIn { from { opacity:0; transform:translateY(20px) scale(.97); } to { opacity:1; transform:none; } }\n@keyframes lkChipPop { from { opacity:0; transform:translateY(10px) scale(.88); } to { opacity:1; transform:none; } }\n@keyframes lkFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-9px); } }\n@keyframes lkGlow { 0%,100% { opacity:.7; } 50% { opacity:1; } }\n@keyframes lkPop { from { opacity:0; transform:scale(.82); } to { opacity:1; transform:none; } }\n@keyframes lkShine { to { transform:translateX(320%) skewX(-20deg); } }\n\n/* Print / PDF: never animate, always show the visible end-state */\n@media print {\n  .hero-brandbar, .hero-copy > *, .hero-visual, .estimate-chip, .estimate-card,\n  .reveal, .reveal.in, .btn-primary::after {\n    opacity:1 !important; transform:none !important; animation:none !important;\n  }\n  .hero::before { animation:none !important; }\n}\n\n/* image-slot — branded empty state so it reads as an intentional photo frame offline */\nimage-slot { border-radius:12px; }\n.estimate-photo::part(frame) { background:linear-gradient(155deg,#24314f 0%,#1b2742 42%,#1156FC 150%); }\n.estimate-photo::part(empty) { color:rgba(255,255,255,0.82); }\n.estimate-photo::part(image) { background:#1b2742; }\n\n/* =========================================================\n   Alternating dark sections — card variants on navy\n   ========================================================= */\n/* Proof bar dark */\n.proof.proof-dark { background:var(--gradient-dark); border-bottom:none; }\n.proof.proof-dark .proof-num { color:#fff; }\n.proof.proof-dark .proof-num .u { color:#93B4FF; }\n.proof.proof-dark .proof-cap { color:rgba(255,255,255,0.6); }\n\n/* Feature cards & steps on dark */\n.section-dark .feat-card,\n.section-dark .step { background:rgba(255,255,255,0.045); border-color:rgba(255,255,255,0.1); box-shadow:none; }\n.section-dark .feat-card h4,\n.section-dark .step h4 { color:#fff; }\n.section-dark .feat-card p,\n.section-dark .step p { color:rgba(255,255,255,0.7); }\n.section-dark .feat-card.card-hover:hover,\n.section-dark .step:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.22); box-shadow:0 20px 44px rgba(0,0,0,0.34); }\n.section-dark .feat-card.card-hover:hover h4 { color:#93B4FF; }\n\n/* Pricing on dark */\n.section-dark .price-card { background:rgba(255,255,255,0.045); border-color:rgba(255,255,255,0.1); box-shadow:none; }\n.section-dark .price-card.featured { background:rgba(17,86,252,0.14); border-color:var(--color-blue); box-shadow:0 0 0 2px var(--color-blue); }\n.section-dark .price-name { color:#fff; }\n.section-dark .price-desc { color:rgba(255,255,255,0.6); }\n.section-dark .price-amount .pa-num,\n.section-dark .price-amount .pa-soon { color:#fff; }\n.section-dark .price-amount .pa-unit { color:rgba(255,255,255,0.6); }\n.section-dark .price-note { color:rgba(255,255,255,0.5); }\n.section-dark .price-feats li { color:rgba(255,255,255,0.85); }\n.section-dark .price-feats li.muted { color:rgba(255,255,255,0.4); }\n.section-dark .pricing-toggle { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }\n.section-dark .pricing-toggle button { color:rgba(255,255,255,0.62); }\n.section-dark .pricing-toggle button.active { background:rgba(255,255,255,0.14); color:#fff; box-shadow:none; }\n.section-dark .btn-ghost { color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.22); }\n.section-dark .btn-ghost:hover { background:rgba(255,255,255,0.08); color:#fff; border-color:rgba(255,255,255,0.42); }\n\n/* FAQ on dark */\n.section-dark .faq-item { background:rgba(255,255,255,0.045); border-color:rgba(255,255,255,0.1); }\n.section-dark .faq-item.open { border-color:rgba(255,255,255,0.22); box-shadow:0 14px 32px rgba(0,0,0,0.28); }\n.section-dark .faq-q { color:#fff; }\n.section-dark .faq-chev { color:#93B4FF; }\n.section-dark .faq-a-inner { color:rgba(255,255,255,0.72); }\n</style>\n<style>\n  /* ---- Qui sommes-nous : page specifics ---- */\n  .qsn-hero { padding:32px 0 92px; }\n  .qsn-hero .hero-brandbar { margin-bottom:64px; }\n  .qsn-hero .hero-grid { grid-template-columns:1fr; gap:0; max-width:820px; }\n  .qsn-hero h1 { color:#fff; margin:22px 0; text-wrap:balance; }\n  .qsn-hero .lead { color:rgba(255,255,255,0.78); max-width:640px; }\n\n  /* founder split */\n  .founder { display:grid; grid-template-columns:1fr; gap:40px; align-items:start; }\n  @media (min-width:920px){ .founder { grid-template-columns:0.85fr 1.15fr; gap:56px; } }\n\n  .founder-portrait { position:relative; }\n  .founder-portrait image-slot { width:100%; height:clamp(380px,42vw,560px); box-shadow:0 24px 50px rgba(15,30,53,0.18); }\n  .founder-portrait .fp-card { position:absolute; left:-14px; bottom:-22px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-xl); box-shadow:var(--shadow-card-hover); padding:16px 20px; display:flex; align-items:center; gap:14px; }\n  @media (max-width:560px){ .founder-portrait .fp-card { left:50%; transform:translateX(-50%); white-space:nowrap; } }\n  .founder-portrait .fp-ic { width:44px; height:44px; border-radius:12px; background:var(--gradient-cta); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:var(--shadow-cta); }\n  .founder-portrait .fp-num { font-family:var(--font-display); font-weight:800; font-size:22px; color:var(--color-navy); line-height:1; }\n  .founder-portrait .fp-cap { font-size:12.5px; color:var(--fg-2); margin-top:3px; }\n\n  .founder-name { font-family:var(--font-display); font-weight:800; font-size:clamp(26px,3.4vw,34px); color:var(--color-navy); letter-spacing:-0.02em; }\n  .founder-role { display:inline-flex; align-items:center; gap:8px; margin-top:8px; font-size:14.5px; font-weight:600; color:var(--color-blue); }\n  .founder-role svg { color:var(--color-blue); }\n  .founder-bio { margin-top:24px; }\n  .founder-bio p { color:var(--fg-2); font-size:16px; line-height:1.8; margin-bottom:16px; }\n  .founder-bio p:last-child { margin-bottom:0; }\n  .founder-bio strong { color:var(--color-navy); font-weight:600; }\n\n  .founder-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:30px; }\n  @media (max-width:560px){ .founder-stats { grid-template-columns:1fr; } }\n  .fstat { background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-lg); padding:20px 18px; box-shadow:var(--shadow-sm); transition:transform var(--duration-base) var(--ease-out), box-shadow var(--duration-base) var(--ease-out), border-color var(--duration-base) var(--ease-out); }\n  .fstat:hover { transform:translateY(-4px); box-shadow:var(--shadow-card); border-color:var(--border-strong); }\n  .fstat .fs-num { font-family:var(--font-display); font-weight:800; font-size:26px; color:var(--color-blue); letter-spacing:-0.02em; line-height:1; }\n  .fstat .fs-cap { font-size:13px; color:var(--fg-2); margin-top:8px; line-height:1.45; }\n\n  /* expertise chips */\n  .expertise { display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }\n  .exp-chip { display:inline-flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600; color:var(--color-navy); background:var(--bg-tint); border:1px solid var(--border-strong); border-radius:var(--radius-pill); padding:9px 16px; }\n  .exp-chip svg { color:var(--color-blue); flex-shrink:0; }\n\n  /* origin story */\n  .story { display:grid; grid-template-columns:1fr; gap:40px; align-items:start; }\n  @media (min-width:920px){ .story { grid-template-columns:1fr 1fr; gap:56px; } }\n  .story-text p { color:var(--fg-2); font-size:16px; line-height:1.8; margin-bottom:18px; }\n  .story-text p:last-child { margin-bottom:0; }\n  .story-text strong { color:var(--color-navy); font-weight:600; }\n  .story-text .st-blue { color:var(--color-blue); font-weight:600; }\n\n  /* obstacles list (dark) */\n  .obstacles { display:flex; flex-direction:column; gap:14px; }\n  .obstacle { display:flex; gap:16px; align-items:flex-start; background:rgba(255,255,255,0.045); border:1px solid rgba(255,255,255,0.1); border-radius:var(--radius-xl); padding:20px 22px; transition:transform var(--duration-base) var(--ease-out), background var(--duration-base) var(--ease-out), border-color var(--duration-base) var(--ease-out); }\n  .obstacle:hover { transform:translateX(4px); background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.2); }\n  .obstacle .ob-ic { width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,0.08); color:#93B4FF; display:flex; align-items:center; justify-content:center; flex-shrink:0; }\n  .obstacle h4 { color:#fff; font-size:16px; margin-bottom:4px; }\n  .obstacle p { color:rgba(255,255,255,0.66); font-size:14px; line-height:1.55; }\n\n  /* mission callout */\n  .mission { max-width:860px; margin:0 auto; text-align:center; }\n  .mission .m-mark { font-family:var(--font-display); font-size:60px; line-height:0.5; color:var(--color-sky-mid); display:block; margin-bottom:18px; }\n  .mission p { font-family:var(--font-display); font-weight:700; font-size:clamp(23px,3.2vw,34px); line-height:1.4; letter-spacing:-0.02em; color:var(--color-navy); text-wrap:balance; }\n  .mission .m-hl { background:var(--gradient-primary); -webkit-background-clip:text; background-clip:text; color:transparent; }\n  .mission .m-sign { margin-top:30px; font-size:15px; color:var(--fg-2); }\n  .mission .m-sign strong { color:var(--color-navy); font-weight:600; }\n\n  /* values */\n  .values-grid { display:grid; grid-template-columns:1fr; gap:20px; }\n  @media (min-width:760px){ .values-grid { grid-template-columns:repeat(3,1fr); } }\n  .value-card { background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-xl); padding:30px 28px; box-shadow:var(--shadow-card); transition:transform var(--duration-base) var(--ease-out), box-shadow var(--duration-base) var(--ease-out), border-color var(--duration-base) var(--ease-out); }\n  .value-card:hover { transform:translateY(-6px); box-shadow:var(--shadow-card-hover); border-color:var(--border-strong); }\n  .value-card .feat-icon { margin-bottom:18px; }\n  .value-card h3 { color:var(--color-navy); font-size:18.5px; margin-bottom:10px; }\n  .value-card p { color:var(--fg-2); font-size:14.5px; line-height:1.65; }\n\n  /* Photo fondateur retiree - aligne sur le section-head \"Le porteur de projet\" (720px, left) */\n  .founder { grid-template-columns: 1fr !important; gap: 24px !important; max-width: 680px !important; margin: 0 !important; }\n  @media (min-width:920px){ .founder { grid-template-columns: 1fr !important; max-width: 680px !important; margin: 0 !important; } }\n  .founder-info { text-align: left; max-width: 100%; }\n  .founder-name { font-size: clamp(26px, 3.2vw, 32px) !important; }\n  .founder-role { font-size: 14px !important; }\n  .founder-bio { margin-top: 18px !important; }\n  .founder-bio p { font-size: 15px !important; line-height: 1.7 !important; margin-bottom: 12px; }\n  .founder-stats { grid-template-columns: repeat(3, 1fr) !important; gap: 12px !important; margin-top: 24px !important; }\n  .founder-stats .fstat { padding: 14px !important; }\n  .founder-stats .fs-num { font-size: 18px !important; }\n  .founder-stats .fs-cap { font-size: 11.5px !important; }\n  .expertise { margin-top: 20px !important; gap: 6px !important; }\n  .expertise .exp-chip { font-size: 12px !important; padding: 6px 10px !important; }</style>\n</head>\n<body>\n\n<span id=\"top\"></span>\n\n<!-- ===================== HERO ===================== -->\n<header class=\"hero qsn-hero\" data-screen-label=\"Qui sommes-nous — Hero\">\n  <div class=\"hero-dots\"></div>\n  <div class=\"container\">\n    <div class=\"hero-brandbar\" style=\"justify-content:flex-end\">\n      <a class=\"btn btn-primary btn-sm\" href=\"https://leenkey-estimator.vercel.app/\" target=\"_blank\" rel=\"noopener\">Valoriser mon bien\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"></path></svg>\n      </a>\n    </div>\n    <div class=\"hero-grid\">\n      <div class=\"hero-copy reveal\">\n        <span class=\"badge badge-dark\" style=\"white-space:nowrap\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"></path><circle cx=\"9\" cy=\"7\" r=\"4\"></circle><path d=\"M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75\"></path></svg>\n          Qui sommes-nous\n        </span>\n        <h1 class=\"h1-display\">Leenkey, c'est d'abord <span class=\"text-grad\">une expérience du terrain.</span></h1>\n        <p class=\"lead\">Pas un projet pensé dans un bureau. Une idée née des situations concrètes vécues par un professionnel de l'immobilier, au contact direct des vendeurs.</p>\n      </div>\n    </div>\n  </div>\n</header>\n\n<!-- ===================== LE PORTEUR DE PROJET ===================== -->\n<section class=\"section\" data-screen-label=\"Le porteur de projet\">\n  <div class=\"container\">\n    <div class=\"section-head left reveal\" style=\"margin-left:0;max-width:680px\">\n      <span class=\"eyebrow\">Le porteur de projet</span>\n      <h2>Cédric Da Cunha, fondateur.</h2>\n    </div>\n    <div class=\"founder\">\n      <div class=\"founder-info reveal\" data-d=\"1\">\n        <div class=\"founder-role\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21h18M5 21V7l8-4v18M19 21V11l-6-4\"></path><path d=\"M9 9v.01M9 12v.01M9 15v.01\"></path></svg>\n          Conseiller immobilier indépendant · Île-de-France\n        </div>\n        <div class=\"founder-bio\">\n          <p>Conseiller immobilier indépendant en Île-de-France, <strong>multipropriétaire et investisseur</strong>, je dispose de plus de 11 ans d'expérience dans la gestion locative, avec une solide pratique en tant que propriétaire bailleur.</p>\n          <p>Cette expérience me confère une connaissance approfondie des enjeux liés à la <strong>transaction immobilière</strong>, à la <strong>copropriété</strong>, ainsi qu'à la gestion des <strong>dossiers notariaux</strong>.</p>\n          <p>Surtout, une connaissance concrète du terrain et du parcours vendeur : estimation des biens, accompagnement stratégique, compréhension des attentes des vendeurs et gestion de la relation client tout au long du processus de vente.</p>\n        </div>\n        <div class=\"founder-stats\">\n          <div class=\"fstat\"><div class=\"fs-num\">11 ans</div><div class=\"fs-cap\">en gestion locative et transaction</div></div>\n          <div class=\"fstat\"><div class=\"fs-num\">Bailleur</div><div class=\"fs-cap\">multipropriétaire et investisseur</div></div>\n          <div class=\"fstat\"><div class=\"fs-num\">Terrain</div><div class=\"fs-cap\">au contact direct des vendeurs</div></div>\n        </div>\n        <div class=\"expertise\">\n          <span class=\"exp-chip\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"></path></svg>Estimation des biens</span>\n          <span class=\"exp-chip\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"></path></svg>Accompagnement stratégique</span>\n          <span class=\"exp-chip\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"></path></svg>Dossiers notariaux</span>\n          <span class=\"exp-chip\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"></path></svg>Copropriété</span>\n          <span class=\"exp-chip\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"></path></svg>Relation client</span>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ===================== LE CONSTAT (DARK) ===================== -->\n<section class=\"section section-dark\" data-screen-label=\"Le constat\">\n  <div class=\"container\">\n    <div class=\"story\">\n      <div class=\"story-text reveal\">\n        <span class=\"eyebrow\">D'où vient Leenkey</span>\n        <h2 style=\"color:#fff;margin:14px 0 22px\">Une idée née d'un constat simple, sur le terrain.</h2>\n        <p style=\"color:rgba(255,255,255,0.78)\">Leenkey est né de situations concrètes rencontrées sur le terrain. De nombreux propriétaires souhaitent <strong style=\"color:#fff\">vendre leur bien par eux-mêmes</strong> afin d'éviter les honoraires d'agence.</p>\n        <p style=\"color:rgba(255,255,255,0.78)\">Pourtant, ils se retrouvent rapidement freinés par la complexité du processus. Et face à ces obstacles, beaucoup finissent par se tourner vers des agences ou des mandataires — dont les honoraires réduisent souvent de manière significative le <strong style=\"color:#fff\">net vendeur</strong>.</p>\n        <p style=\"color:rgba(255,255,255,0.78)\">S'y ajoutent parfois des méthodes de commercialisation et un suivi dont l'efficacité ou la transparence ne sont pas toujours au rendez-vous, ce qui peut ralentir la transaction ou empêcher d'obtenir le meilleur prix dans les meilleurs délais.</p>\n      </div>\n      <div class=\"obstacles reveal\" data-d=\"1\">\n        <div class=\"obstacle\">\n          <span class=\"ob-ic\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"></path><path d=\"M14 2v6h6M9 13h6M9 17h4\"></path></svg></span>\n          <div><h4>Les démarches administratives</h4><p>Un parcours dense, technique, difficile à mener seul sans repère.</p></div>\n        </div>\n        <div class=\"obstacle\">\n          <span class=\"ob-ic\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"></path><path d=\"m7 14 4-4 3 3 5-6\"></path></svg></span>\n          <div><h4>L'analyse des offres</h4><p>Comparer, négocier, juger une offre : sans méthode, on doute.</p></div>\n        </div>\n        <div class=\"obstacle\">\n          <span class=\"ob-ic\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10h18M7 15h2M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"></path></svg></span>\n          <div><h4>Les dossiers de financement</h4><p>Vérifier la solidité d'un acheteur demande de l'expérience.</p></div>\n        </div>\n        <div class=\"obstacle\">\n          <span class=\"ob-ic\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"></path></svg></span>\n          <div><h4>La peur de l'erreur</h4><p>Une maladresse peut compromettre toute la vente. Le risque inquiète.</p></div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ===================== LA MISSION ===================== -->\n<section class=\"section section-alt\" data-screen-label=\"La mission\">\n  <div class=\"container mission reveal\">\n    <span class=\"m-mark\">“</span>\n    <p>C'est dans ce contexte que Leenkey a été imaginé : apporter une solution claire, efficace et accessible pour accompagner les vendeurs qui veulent <span class=\"m-hl\">garder la maîtrise de leur vente</span>, tout en étant sécurisés à chaque étape.</p>\n    <div class=\"m-sign\">— <strong>Cédric Da Cunha</strong>, fondateur de Leenkey</div>\n  </div>\n</section>\n\n<!-- ===================== CE QUI NOUS GUIDE ===================== -->\n<section class=\"section\" data-screen-label=\"Ce qui nous guide\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"eyebrow\">Ce qui nous guide</span>\n      <h2>Trois convictions, héritées du terrain.</h2>\n    </div>\n    <div class=\"values-grid\">\n      <div class=\"value-card reveal\">\n        <span class=\"feat-icon\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5z\"></path><path d=\"m9 12 2 2 4-4\"></path></svg></span>\n        <h3>Le vendeur garde la maîtrise</h3>\n        <p>Vendre par soi-même ne devrait jamais vouloir dire être seul. On donne les outils, vous gardez la décision.</p>\n      </div>\n      <div class=\"value-card reveal\" data-d=\"1\">\n        <span class=\"feat-icon\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"></path></svg></span>\n        <h3>Le net vendeur, protégé</h3>\n        <p>Chaque euro d'honoraires en moins, c'est un euro de plus pour vous. Un coût clair, sans commission cachée.</p>\n      </div>\n      <div class=\"value-card reveal\" data-d=\"2\">\n        <span class=\"feat-icon\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-12V5l-8-3-8 3v5c0 8 8 12 8 12z\"></path><path d=\"m9 12 2 2 4-4\"></path></svg></span>\n        <h3>Sécurisé à chaque étape</h3>\n        <p>De l'estimation au notaire, chaque moment clé est cadré et expliqué. Vendre sans agence, sans prendre de risque.</p>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ===================== CTA FINAL ===================== -->\n<section class=\"section cta-final\" data-screen-label=\"CTA final\">\n  <div class=\"cta-dots\"></div>\n  <div class=\"container reveal\">\n    <h2 class=\"h2\">Vendez avec quelqu'un qui connaît le terrain.</h2>\n    <p>5 minutes pour connaître la valeur réelle de votre bien. Gratuit, sans engagement.</p>\n    <a class=\"btn btn-white btn-lg\" href=\"https://leenkey-estimator.vercel.app/\" target=\"_blank\" rel=\"noopener\">Valoriser mon bien gratuitement\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"></path></svg>\n    </a>\n    <div class=\"cta-mini\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-12V5l-8-3-8 3v5c0 8 8 12 8 12z\"></path><path d=\"m9 12 2 2 4-4\"></path></svg>Accompagné par un professionnel de l'immobilier</div>\n  </div>\n</section>\n\n<!-- thumbnail for bundler -->\n\n\n<script src=\"18d2f95f-9836-4210-b1ef-6ddb8ed0f983\"><\/script>\n<script src=\"4bbdcbaf-e16e-4ead-b70c-525bf1e3fa4b\"><\/script>\n\n\n\n</body></html>"</script>
